# PS5 Gentoo genkernel defaults.
# The upstream PS5 kernel .config is installed in /usr/src/linux-*-ps5/.config
# and should be used as-is.

KERNEL_CONFIG="/usr/src/linux/.config"
MENUCONFIG="no"
MRPROPER="no"
OLDCONFIG="yes"
CLEAN="yes"
INSTALL="yes"
MOUNTBOOT="yes"
BOOTDIR="/boot"

# Keep common initramfs plumbing enabled.
# This is suitable for USB/NVMe root filesystems.
BUSYBOX="yes"
DISKLABEL="yes"
UDEV="yes"

LVM="no"
DMRAID="no"
MDADM="no"
LUKS="no"

BTRFS="yes"
ZFS="no"
